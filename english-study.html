<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Class</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Monochrome palette ── */
  --bg:        #F8F8F8;
  --surface:   #FFFFFF;
  --surface2:  #F2F2F2;
  --surface3:  #EBEBEB;
  --border:    #E4E4E4;
  --border2:   #CACACA;
  --text1:     #0D0D0D;
  --text2:     #505050;
  --text3:     #9A9A9A;

  /* Brand = black */
  --brand:       #0D0D0D;
  --brand-hover: #2A2A2A;
  --brand-light: #F0F0F0;

  /* Category badges — monochrome differentiated */
  --cat-daily-bg:  #F0F0F0; --cat-daily-fg:  #1A1A1A;
  --cat-biz-bg:    #1A1A1A; --cat-biz-fg:    #FFFFFF;
  --cat-idiom-bg:  #0D0D0D; --cat-idiom-fg:  #F8F8F8;
  --cat-slang-bg:  #E0E0E0; --cat-slang-fg:  #1A1A1A;
  --cat-filler-bg: #FFFFFF; --cat-filler-fg: #505050;

  /* Quiz feedback */
  --correct-bg: #0D0D0D; --correct-fg: #FFFFFF;
  --wrong-bg:   #F0F0F0; --wrong-fg:   #9A9A9A;

  /* Misc */
  --tip-bg:    #F2F2F2; --tip-fg:    #303030;
  --nuance-bg: #EBEBEB; --nuance-fg: #404040;
  --r1: 6px; --r2: 10px; --r3: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 8px rgba(0,0,0,0.04);
}

html { font-size: 14px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo',
               'Noto Sans KR', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text1);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  background: var(--brand);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-logo  { font-size: 18px; line-height: 1; }
.header-title {
  font-size: 14px;
  font-weight: 700;
  color: #FFFFFF;
  letter-spacing: 0.02em;
}
.header-sub { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; letter-spacing: 0.03em; }
.header-left  { display: flex; align-items: center; gap: 10px; }
.header-badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 3px 8px;
  border-radius: 4px;
}

/* ── NAV ── */
.nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: center;
  gap: 2px;
  padding: 10px 16px;
  position: sticky;
  top: 52px;
  z-index: 99;
}
.nav-btn {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
  padding: 7px 18px;
  border: 1px solid transparent;
  border-radius: 6px;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.nav-btn:hover  { background: var(--surface2); color: var(--text1); }
.nav-btn.active { background: var(--brand); color: #FFFFFF; border-color: var(--brand); }

/* ── CONTENT ── */
.content { max-width: 680px; margin: 0 auto; padding: 24px 16px 64px; }

/* ── SECTION ── */
.section { display: none; }
.section.active { display: block; }

/* ── CARD BASE ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r3);
  padding: 18px 20px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}

/* ── HOME HERO ── */
.home-hero {
  background: var(--brand);
  border-radius: var(--r3);
  padding: 28px 24px 24px;
  margin-bottom: 12px;
  color: #FFFFFF;
  position: relative;
  overflow: hidden;
}
.home-hero::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.home-hero::after {
  content: '';
  position: absolute;
  bottom: -20px; right: 20px;
  width: 90px; height: 90px;
  border-radius: 50%;
  background: rgba(255,255,255,0.03);
}
.hero-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.hero-label::before {
  content: '';
  display: inline-block;
  width: 16px; height: 1px;
  background: rgba(255,255,255,0.3);
}
.hero-en {
  font-size: 24px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 6px;
  letter-spacing: -0.3px;
}
.hero-ko { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 18px; }
.hero-example {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--r2);
  padding: 12px 14px;
  font-size: 12.5px;
  line-height: 1.65;
}
.hero-example .ex-en { font-weight: 500; margin-bottom: 3px; color: rgba(255,255,255,0.9); }
.hero-example .ex-ko { color: rgba(255,255,255,0.5); font-size: 12px; }

/* ── TIP CARD ── */
.tip-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 14px 16px;
  margin-bottom: 12px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  box-shadow: var(--shadow);
}
.tip-icon  { font-size: 15px; flex-shrink: 0; margin-top: 1px; opacity: 0.7; }
.tip-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 5px;
}
.tip-body  { font-size: 13px; color: var(--text2); line-height: 1.65; }

/* ── STATS ── */
.stats-row { display: flex; gap: 8px; margin-bottom: 12px; }
.stat-pill {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 14px 10px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-num { font-size: 24px; font-weight: 800; color: var(--text1); letter-spacing: -0.5px; }
.stat-lbl { font-size: 10px; color: var(--text3); margin-top: 3px; letter-spacing: 0.04em; text-transform: uppercase; }

/* ── HOME NAV GRID ── */
.home-nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.home-nav-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 16px;
  cursor: pointer;
  transition: all 0.18s;
  box-shadow: var(--shadow);
}
.home-nav-card:hover {
  border-color: var(--brand);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}
.hnc-icon  { font-size: 20px; margin-bottom: 8px; }
.hnc-title { font-size: 13px; font-weight: 700; color: var(--text1); }
.hnc-desc  { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* ── DIVIDER ── */
.sec-divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

/* ── FILTER ROW ── */
.filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.filter-btn {
  font-size: 12px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.01em;
}
.filter-btn:hover  { border-color: var(--border2); color: var(--text1); background: var(--surface2); }
.filter-btn.active { background: var(--brand); border-color: var(--brand); color: #FFFFFF; }

/* ── SEARCH ── */
.search-wrap { position: relative; margin-bottom: 12px; }
.search-input {
  width: 100%;
  font-size: 13px;
  padding: 10px 14px 10px 38px;
  border: 1px solid var(--border);
  border-radius: var(--r2);
  background: var(--surface);
  color: var(--text1);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--border2); box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--text3);
  pointer-events: none;
}
.count-label { font-size: 11px; color: var(--text3); margin-bottom: 10px; letter-spacing: 0.02em; }

/* ── PHRASE CARD ── */
.expr-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r3);
  padding: 16px 18px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  transition: border-color 0.15s;
}
.expr-card:hover { border-color: var(--border2); }
.expr-top  { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
.expr-en   { font-size: 15px; font-weight: 700; color: var(--text1); line-height: 1.4; letter-spacing: -0.2px; }
.expr-ko   { font-size: 13px; color: var(--text2); margin-bottom: 10px; line-height: 1.5; }
.expr-example {
  font-size: 12px;
  background: var(--surface2);
  border-radius: var(--r1);
  padding: 10px 12px;
  line-height: 1.7;
  border-left: 2px solid var(--border2);
}
.expr-example .ex-en { color: var(--text1); font-weight: 600; margin-bottom: 2px; }
.expr-example .ex-ko { color: var(--text3); }
.nuance-badge {
  display: block;
  font-size: 12px;
  padding: 9px 12px;
  border-radius: var(--r1);
  background: var(--nuance-bg);
  color: var(--nuance-fg);
  margin-top: 10px;
  font-weight: 400;
  line-height: 1.7;
  border-left: 2px solid var(--border2);
}

/* ── LEVEL BADGES ── */
.level-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 7px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.level-beginner     { background: #F0F0F0; color: #555555; border: 1px solid #D8D8D8; }
.level-intermediate { background: #1A1A1A; color: #FFFFFF; }
.level-advanced     { background: #0D0D0D; color: #F8F8F8; border: 2px solid #0D0D0D; }

/* ── MULTIPLE EXAMPLES ── */
.ex-item + .ex-item {
  margin-top: 9px;
  padding-top: 9px;
  border-top: 1px solid var(--border);
}

/* ── CATEGORY BADGES ── */
.cat-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.cat-daily  { background: var(--cat-daily-bg);  color: var(--cat-daily-fg);  border: 1px solid #D8D8D8; }
.cat-biz    { background: var(--cat-biz-bg);    color: var(--cat-biz-fg); }
.cat-idiom  { background: var(--cat-idiom-bg);  color: var(--cat-idiom-fg); }
.cat-slang  { background: var(--cat-slang-bg);  color: var(--cat-slang-fg);  border: 1px solid #CBCBCB; }
.cat-filler { background: var(--cat-filler-bg); color: var(--cat-filler-fg); border: 1px solid var(--border2); }

/* ── SENTENCE CARD ── */
.sent-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r3);
  padding: 16px 18px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  transition: border-color 0.15s;
}
.sent-card:hover { border-color: var(--border2); }
.sent-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.sent-en  { font-size: 14px; font-weight: 700; color: var(--text1); line-height: 1.55; letter-spacing: -0.1px; }
.sent-ko  { font-size: 13px; color: var(--text2); line-height: 1.6; margin-top: 4px; }
.sent-note {
  display: block;
  font-size: 12px;
  font-weight: 400;
  padding: 8px 10px;
  border-radius: var(--r1);
  background: var(--surface2);
  color: var(--text2);
  margin-top: 8px;
  line-height: 1.65;
  border-left: 2px solid var(--border2);
}

/* ── QUIZ EXPLAIN ── */
.quiz-explain {
  font-size: 12px;
  margin-top: 10px;
  line-height: 1.7;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.18);
}
.wrong-fb .quiz-explain {
  border-top-color: var(--border);
}

.bm-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  flex-shrink: 0;
  margin-top: -1px;
  padding: 2px 4px;
  line-height: 1;
  transition: transform 0.15s, opacity 0.15s;
  opacity: 0.5;
}
.bm-btn:hover { transform: scale(1.2); opacity: 1; }
.bm-btn.starred { opacity: 1; }

.bm-filter-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.bm-toggle {
  font-size: 11px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 0.02em;
}
.bm-toggle:hover { border-color: var(--border2); color: var(--text1); }
.bm-toggle.on    { background: var(--brand); border-color: var(--brand); color: #FFFFFF; }

/* ── QUIZ ── */
.quiz-wrap { max-width: 540px; margin: 0 auto; }

.quiz-progress-bar {
  height: 3px;
  background: var(--surface3);
  border-radius: 2px;
  margin-bottom: 20px;
  overflow: hidden;
}
.quiz-fill {
  height: 100%;
  background: var(--brand);
  border-radius: 2px;
  transition: width 0.4s ease;
}
.quiz-meta {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.quiz-type-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text2);
  margin-bottom: 14px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border: 1px solid var(--border);
}
.quiz-prompt {
  font-size: 17px;
  font-weight: 700;
  color: var(--text1);
  line-height: 1.55;
  margin-bottom: 10px;
  letter-spacing: -0.2px;
}
.quiz-blank {
  color: var(--text1);
  background: var(--surface3);
  padding: 1px 6px;
  border-radius: 3px;
  border-bottom: 2px solid var(--brand);
}
.quiz-hint {
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 18px;
  padding-left: 1px;
}
.quiz-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.opt-btn {
  font-size: 14px;
  padding: 13px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--r2);
  background: var(--surface);
  color: var(--text1);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  font-weight: 500;
  line-height: 1.4;
}
.opt-btn:hover:not(:disabled) {
  border-color: var(--brand);
  background: var(--surface2);
}
.opt-btn.correct {
  border-color: var(--brand);
  background: var(--correct-bg);
  color: var(--correct-fg);
  font-weight: 600;
}
.opt-btn.wrong {
  border-color: var(--border);
  background: var(--wrong-bg);
  color: var(--wrong-fg);
  text-decoration: line-through;
}
.opt-btn:disabled { cursor: default; }

.quiz-feedback {
  border-radius: var(--r2);
  padding: 13px 16px;
  margin-bottom: 14px;
  font-size: 13px;
  line-height: 1.65;
  display: none;
  border: 1px solid var(--border);
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct-fb { background: var(--brand); color: #FFFFFF; border-color: var(--brand); }
.quiz-feedback.wrong-fb   { background: var(--surface2); color: var(--text2); }
.feedback-result { font-weight: 700; font-size: 14px; margin-bottom: 4px; }

.next-btn {
  width: 100%;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 14px;
  border: none;
  border-radius: var(--r2);
  background: var(--brand);
  color: #FFFFFF;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.next-btn:hover  { background: var(--brand-hover); }
.next-btn:active { transform: scale(0.99); }

.quiz-start { text-align: center; padding: 40px 20px; }
.quiz-start-icon  { font-size: 44px; margin-bottom: 16px; }
.quiz-start-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 10px; }
.quiz-start-desc  { font-size: 14px; color: var(--text2); margin-bottom: 28px; line-height: 1.65; }
.best-badge {
  display: inline-block;
  font-size: 12px;
  color: var(--text3);
  border: 1px solid var(--border);
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 22px;
}
.start-btn {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 14px 44px;
  border: none;
  border-radius: var(--r2);
  background: var(--brand);
  color: #FFFFFF;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.start-btn:hover  { background: var(--brand-hover); }
.start-btn:active { transform: scale(0.98); }

.quiz-result { text-align: center; padding: 40px 20px; }
.result-score {
  font-size: 72px;
  font-weight: 800;
  color: var(--text1);
  letter-spacing: -3px;
  line-height: 1;
  margin: 12px 0 4px;
}
.result-total { font-size: 13px; color: var(--text3); margin-bottom: 16px; letter-spacing: 0.05em; }
.result-grade { font-size: 18px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.3px; }
.result-desc  { font-size: 14px; color: var(--text2); line-height: 1.65; margin-bottom: 6px; }
.best-score   { font-size: 12px; color: var(--text3); margin-bottom: 28px; }
.replay-btn {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 13px 40px;
  border: none;
  border-radius: var(--r2);
  background: var(--brand);
  color: #FFFFFF;
  cursor: pointer;
  transition: background 0.15s;
}
.replay-btn:hover { background: var(--brand-hover); }

/* ── BOOKMARKS EMPTY STATE ── */
.bm-empty {
  text-align: center;
  padding: 50px 20px;
  color: var(--text3);
}
.bm-empty-icon  { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
.bm-empty-title { font-size: 15px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
.bm-empty-desc  { font-size: 13px; line-height: 1.6; }

/* ── BOOKMARK SECTION TABS ── */
.bm-sec-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.bm-sec-tab {
  font-size: 12px; font-weight: 600; padding: 6px 16px;
  border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text3);
  cursor: pointer; transition: all 0.15s;
}
.bm-sec-tab:hover  { color: var(--text1); border-color: var(--border2); }
.bm-sec-tab.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── SECTION HEADER ── */
.sec-header { margin-bottom: 18px; }
.sec-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--text1);
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.sec-desc { font-size: 13px; color: var(--text3); line-height: 1.5; }

/* ── BOTTOM NAV (mobile only, hidden on desktop) ── */
.bottom-nav { display: none; }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  /* Hide top nav, show bottom tab bar */
  .nav { display: none; }
  .content {
    padding: 16px 14px calc(68px + env(safe-area-inset-bottom));
    /* no offset needed — header is sticky, nav is hidden */
  }

  /* Bottom tab bar */
  .bottom-nav {
    display: flex;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #FFFFFF;
    border-top: 1px solid var(--border);

<script>
/* ═══════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════ */
const DATA = {

phrases: [
  // ── 일상 회화 ──
  { id:1, cat:"daily", level:"beginner", en:"What's up?", ko:"어떻게 지내? / 무슨 일이야?",
    examples:[
      { en:"Hey, what's up? Haven't seen you in a while.", ko:"야, 어떻게 지냈어? 오랜만이다." },
      { en:"What's up? You seem a little stressed today.", ko:"무슨 일이야? 오늘 좀 스트레스받아 보이네." },
      { en:"What's up with the team lately? Everything okay?", ko:"요즘 팀 분위기 어때? 다 괜찮아?" }
    ],
    nuance:"'How are you?'는 형식적이고 진지한 답변(I'm fine, thank you)을 기대해요. 반면 'What's up?'은 'Not much, you?'처럼 가벼운 한마디로 넘어가는 인사예요. 친한 친구·동료 사이에서만 자연스럽고, 처음 만나는 사람이나 윗사람에게는 어색할 수 있어요." },
  { id:2, cat:"daily", level:"beginner", en:"Sounds good!", ko:"좋아요! / 그렇게 해요!",
    examples:[
      { en:"Let's meet at 3pm. — Sounds good!", ko:"3시에 만나요. — 좋아요!" },
      { en:"I'll send you the report by noon. — Sounds good!", ko:"점심까지 보고서 보낼게요. — 좋아요!" },
      { en:"How about coffee after the meeting? — Sounds good to me!", ko:"미팅 후에 커피 어때요? — 저는 좋아요!" }
    ],
    nuance:"'OK'는 중립적이고 약간 무덤덤하게 들릴 수 있어요. 'Sounds good!'은 상대방 제안을 진심으로 환영한다는 활기차고 긍정적인 뉘앙스를 줘요. 이메일 답변, 문자, 구어 모두에서 자연스럽게 써요." },
  { id:3, cat:"daily", level:"beginner", en:"No worries.", ko:"괜찮아요 / 신경 쓰지 마세요",
    examples:[
      { en:"Sorry I'm late. — No worries at all!", ko:"늦어서 미안해요. — 전혀 괜찮아요!" },
      { en:"I forgot to reply to your email. — No worries, I figured it out.", ko:"이메일 답장을 못 했어요. — 괜찮아요, 알아서 해결했어요." },
      { en:"Can I change our meeting to Thursday? — No worries, Thursday works.", ko:"미팅을 목요일로 바꿔도 될까요? — 괜찮아요, 목요일 돼요." }
    ],
    nuance:"'It's okay'는 마지못해 용서해주는 뉘앙스가 될 수 있어요. 'No worries'는 '전혀 신경 쓰지 마세요'라는 더 따뜻하고 넉넉한 느낌이에요. 호주·영국 영어에서 특히 자주 쓰이고, 미국에서도 매우 자연스러운 표현이에요." },
  { id:4, cat:"daily", level:"beginner", en:"Hang on a sec.", ko:"잠깐만요",
    examples:[
      { en:"Hang on a sec, let me check my phone.", ko:"잠깐만요, 폰 확인해 볼게요." },
      { en:"Hang on a sec — I think I left my keys inside.", ko:"잠깐만요 — 열쇠를 안에 두고 온 것 같아요." },
      { en:"Hang on a sec before you send that email — let me review it first.", ko:"이메일 보내기 전에 잠깐만요 — 제가 먼저 검토할게요." }
    ],
    nuance:"'Wait'만 쓰면 짧고 명령조로 들릴 수 있어요. 'Hang on a sec'은 '금방이에요, 잠깐만요'라는 친근하고 부드러운 뉘앙스예요. 'sec'은 second(초)의 줄임말로, 아주 짧은 시간임을 강조해요." },
  { id:5, cat:"daily", level:"intermediate", en:"I've been meaning to tell you.", ko:"전부터 말하려고 했었어요",
    examples:[
      { en:"I've been meaning to tell you — you did a great job on that project.", ko:"전부터 말하려고 했는데 — 그 프로젝트 정말 잘 했어요." },
      { en:"I've been meaning to tell you that I really appreciate your help.", ko:"전부터 말하려고 했는데, 도와줘서 정말 고마워요." },
      { en:"I've been meaning to tell you — I'm thinking of moving to a new city.", ko:"전부터 말하려고 했는데 — 새 도시로 이사 생각 중이에요." }
    ],
    nuance:"'I want to tell you'는 단순히 지금 말하고 싶다는 뜻이에요. 'I've been meaning to tell you'는 전부터 말하려고 했는데 타이밍을 못 잡았다는 뉘앙스예요. '이 말이 나에게 중요했다'는 무게감을 전달해서 칭찬이나 중요한 얘기를 꺼낼 때 훨씬 진심 있게 들려요." },
  { id:6, cat:"daily", level:"beginner", en:"My bad.", ko:"내 잘못이에요 / 미안해요",
    examples:[
      { en:"Oh, I sent the wrong file. My bad!", ko:"아, 잘못된 파일을 보냈네요. 미안해요!" },
      { en:"My bad — I thought the meeting was at 3, not 2.", ko:"내 잘못이야 — 미팅이 3시인 줄 알았는데 2시였네." },
      { en:"I forgot to tell you about the change. My bad!", ko:"변경 사항을 말해주는 걸 잊었어요. 미안해요!" }
    ],
    nuance:"'I'm sorry'나 'I apologize'는 진지하고 격식 있는 사과예요. 'My bad'는 가벼운 실수를 '아, 내 잘못이네!'하고 바로 인정하는 캐주얼한 표현이에요. 친한 사이에서만 자연스럽고, 공식 상황이나 윗사람에게는 어울리지 않아요." },
  { id:7, cat:"daily", level:"beginner", en:"That makes sense.", ko:"이해가 돼요 / 말이 되네요",
    examples:[
      { en:"We should leave early because of traffic. — That makes sense.", ko:"차막혀서 일찍 출발해야 해요. — 이해돼요." },
      { en:"I divided the work that way to be more efficient. — That makes sense.", ko:"더 효율적이려고 그렇게 일을 나눴어요. — 말이 되네요." },
      { en:"She didn't come because she wasn't feeling well. — Oh, that makes sense.", ko:"몸이 안 좋아서 못 왔대요. — 아, 그렇군요." }
    ],
    nuance:"'I understand'는 정보를 받아들였다는 느낌이에요. 'That makes sense'는 '논리적으로 납득이 간다'는 뉘앙스로, 단순한 이해를 넘어 상대방 말이 합리적이라고 동의하는 느낌을 줘요. 설명을 들은 뒤 자연스러운 반응으로 매우 자주 써요." },
  { id:8, cat:"daily", level:"beginner", en:"Let me know.", ko:"알려주세요",
    examples:[
      { en:"Let me know if you need anything.", ko:"필요한 게 있으면 알려주세요." },
      { en:"Let me know when you're free to meet.", ko:"언제 만날 수 있는지 알려주세요." },
      { en:"Let me know if anything comes up and you need to cancel.", ko:"취소해야 할 일이 생기면 알려주세요." }
    ],
    nuance:"'Tell me'는 짧고 명령처럼 들릴 수 있어요. 'Let me know'는 '편하실 때 알려주세요'라는 열린 뉘앙스예요. 이메일 마무리로 'Let me know if you have any questions'처럼 쓰는 것도 아주 자연스러운 비즈니스 표현이에요." },
  { id:9, cat:"daily", level:"intermediate", en:"Fair enough.", ko:"그럴 수 있죠 / 납득이 가요",
    examples:[
      { en:"I can't make it tonight. — Fair enough, see you next time!", ko:"오늘 밤 못 갈 것 같아요. — 그럴 수 있죠, 다음에 봐요!" },
      { en:"I'd rather handle it myself. — Fair enough, I won't interfere.", ko:"직접 처리하고 싶어요. — 그럴 수 있죠, 개입 안 할게요." },
      { en:"I prefer email over calls. — Fair enough, I'll email you.", ko:"전화보다 이메일이 좋아요. — 알겠어요, 이메일로 할게요." }
    ],
    nuance:"'I agree'는 완전한 동의지만, 'Fair enough'는 100% 동의하지 않더라도 상대방 이유나 상황을 납득했을 때 쓰는 표현이에요. '그럴 수 있겠다, 이해했다'는 열린 태도를 보여주고, 논쟁 후 상대 입장을 인정할 때도 유용해요." },
  { id:10, cat:"daily", level:"intermediate", en:"I hear you.", ko:"무슨 말인지 알아요 / 공감해요",
    examples:[
      { en:"I'm really stressed about the deadline. — I hear you, it's been a tough week.", ko:"마감 때문에 너무 스트레스예요. — 무슨 말인지 알아요, 힘든 한 주였죠." },
      { en:"Working from home gets lonely. — I hear you, it can be isolating.", ko:"재택근무가 가끔 외로워요. — 공감해요, 고립된 느낌이 들 수 있죠." },
      { en:"I just feel like no one listens. — I hear you. I'm listening right now.", ko:"아무도 내 말을 안 듣는 것 같아요. — 공감해요. 지금 제가 듣고 있어요." }
    ],
    nuance:"'I understand'는 정보를 이해했다는 인지적 반응이에요. 'I hear you'는 상대방의 감정과 상황까지 공감한다는 정서적 반응이에요. 누군가 힘들다고 털어놓을 때 'I hear you'라고 하면 훨씬 따뜻하고 진심 어린 공감으로 들려요." },

  // ── 비즈니스 ──
  { id:11, cat:"biz", level:"advanced", en:"Just to follow up on...", ko:"~에 대해 후속 확인 차",
    examples:[
      { en:"Just to follow up on our meeting last Thursday — did we confirm the schedule?", ko:"지난 목요일 미팅 후속인데요 — 일정 확정됐나요?" },
      { en:"Just to follow up on my email from yesterday — have you had a chance to review it?", ko:"어제 이메일 후속으로요 — 검토해보셨나요?" },
      { en:"Just to follow up on our conversation — have you made a decision yet?", ko:"저희 대화 후속으로요 — 결정하셨나요?" }
    ],
    nuance:"'Just to'의 'just'가 핵심이에요. 없이 'I'm following up'이라고만 하면 다소 딱딱하지만, 'Just to follow up'은 '별거 아닌데 그냥 확인차로요'라는 뉘앙스로 요청을 부드럽게 만들어줘요. 비즈니스 이메일 첫 줄로 가장 많이 쓰이는 표현 중 하나예요." },
  { id:12, cat:"biz", level:"intermediate", en:"I'll keep you posted.", ko:"계속 업데이트해 드릴게요",
    examples:[
      { en:"We're still reviewing the proposal. I'll keep you posted.", ko:"제안서 검토 중이에요. 업데이트해 드릴게요." },
      { en:"The results aren't out yet, but I'll keep you posted.", ko:"결과가 아직 안 나왔어요, 계속 알려드릴게요." },
      { en:"I'll keep you posted on any changes to the plan.", ko:"계획에 변경이 생기면 계속 알려드릴게요." }

      { en:"I only eat fast food once in a blue moon.", ko:"패스트푸드는 아주 가끔씩만 먹어요." },
      { en:"She calls her parents once in a blue moon — maybe twice a year.", ko:"그녀는 부모님께 아주 가끔 연락해요 — 일 년에 두 번 정도요." },
      { en:"Once in a blue moon, we get a really quiet day at the office.", ko:"아주 드물게 사무실이 정말 조용한 날이 있어요." }
    ],
    nuance:"'Blue moon'은 한 달에 두 번째 뜨는 보름달로 아주 드문 현상이에요. 그래서 '아주 드물게, 거의 안 하다'는 의미예요. 'Rarely'보다 훨씬 생생하고 문학적이며, 약간의 유머 뉘앙스도 담겨 있어요." },
  { id:52, cat:"idiom", level:"intermediate", en:"Pull someone's leg", ko:"장난치다 / 놀리다",
    examples:[
      { en:"Are you serious? — Relax, I'm just pulling your leg!", ko:"진짜예요? — 긴장 풀어요, 그냥 장난치는 거예요!" },
      { en:"He told me he won the lottery, but he was just pulling my leg.", ko:"그가 복권에 당첨됐다고 했는데, 그냥 장난친 거였어요." },
      { en:"Come on, you're pulling my leg — that can't be true.", ko:"에이, 장난치는 거죠 — 그럴 리가 없잖아요." }
    ],
    nuance:"누군가 다리를 잡아당겨 넘어뜨리려는 장난처럼, '놀리다, 장난치다'는 표현이에요. 'I'm just joking'보다 생생하고, 상대방이 진지하게 받아들였을 때 'I'm just pulling your leg!'라고 하면 아주 자연스럽게 상황을 풀어줘요." },

  // ── 슬랭 추가 ──
  { id:53, cat:"slang", level:"intermediate", en:"Lowkey", ko:"은근히 / 솔직히 말하면",
    examples:[
      { en:"I'm lowkey obsessed with this new coffee place.", ko:"이 새로운 카페에 은근히 완전 빠졌어요." },
      { en:"I lowkey want to cancel my plans and just stay home tonight.", ko:"은근히 약속 취소하고 오늘 밤 그냥 집에 있고 싶어요." },
      { en:"That movie was lowkey really good — I didn't expect it.", ko:"그 영화 은근히 진짜 좋았어요 — 기대 안 했는데." }
    ],
    nuance:"'Lowkey'는 '낮은 강도로' 표현하는 뉘앙스예요. 'Secretly'나 'Honestly'와 비슷하지만 훨씬 캐주얼해요. 강하게 드러내지 않고 은근슬쩍 인정하거나, '사실 조용히 말하면...'이라는 느낌으로 쓰여요. 반대말 'highkey'는 '대놓고, 솔직히'라는 의미예요." },
  { id:54, cat:"slang", level:"intermediate", en:"It's giving...", ko:"~같은 느낌이야 / ~분위기야",
    examples:[
      { en:"That outfit is giving main character energy.", ko:"그 옷 진짜 주인공 분위기 나는데." },
      { en:"This café is giving very Parisian vibes.", ko:"이 카페 진짜 파리 느낌 나는데." },
      { en:"That speech was giving total villain arc.", ko:"그 연설 완전 빌런 분위기였어." }
    ],
    nuance:"MZ세대 슬랭으로 '~같은 에너지·분위기를 풍기다'는 표현이에요. 원어민은 'It gives off ~'대신 'It's giving ~'을 써요. 패션, 분위기, 행동에 대한 인상을 생생하게 묘사할 때 쓰고, 뒤에 다양한 명사를 붙여 응용할 수 있어요." },
  { id:55, cat:"slang", level:"beginner", en:"Slay", ko:"완전 잘하다 / 죽인다",
    examples:[
      { en:"You absolutely slayed that presentation!", ko:"그 발표 완전 죽였어요!" },
      { en:"She slayed the red carpet look last night.", ko:"그녀 어젯밤 레드카펫 룩 완전 죽였어요." },
      { en:"Slay! That outfit is everything.", ko:"완전 죽인다! 그 옷 너무 좋아요." }
    ],
    nuance:"원래 '죽이다'는 뜻이지만, 슬랭으로 '압도적으로 잘하다, 완전 멋지게 해냈다'는 의미예요. 'You did great'보다 훨씬 강렬하고 열정적인 칭찬이에요. 발표, 패션, 공연 등에서 누군가가 기대 이상으로 멋졌을 때 써요." },
  { id:56, cat:"slang", level:"beginner", en:"Vibe", ko:"분위기 / 느낌 / 공감이 가다",
    examples:[
      { en:"I really vibe with this playlist.", ko:"이 플레이리스트 진짜 내 취향이에요." },
      { en:"This place has such a good vibe — I love it here.", ko:"여기 분위기 너무 좋아요 — 완전 마음에 들어요." },
      { en:"We vibed instantly — felt like we'd known each other for years.", ko:"우리 바로 잘 맞았어요 — 몇 년을 알고 지낸 것 같은 느낌이었어요." }
    ],
    nuance:"명사로는 '분위기·느낌·에너지', 동사로는 '잘 맞다·공감하다'는 뜻이에요. 'Atmosphere'는 격식 있는 반면, 'vibe'는 느끼는 에너지를 캐주얼하게 표현해요. 'Good vibes only!'처럼 긍정적인 에너지를 뜻하기도 하고, 'This place has a great vibe'처럼 장소 분위기를 표현할 때도 써요." },

  // ── 필러 추가 ──
  { id:57, cat:"filler", level:"intermediate", en:"Long story short...", ko:"한마디로 말하면 / 결론만 말하면",
    examples:[
      { en:"Long story short, we missed the deadline and had to reschedule.", ko:"결론만 말하면, 마감을 놓쳐서 일정을 다시 잡아야 했어요." },
      { en:"Long story short, I quit my job and I'm starting my own business.", ko:"한마디로, 회사 그만두고 제 사업을 시작할 거예요." },
      { en:"There was a lot of drama, but long story short — we made up.", ko:"많은 일이 있었는데, 결론만 말하면 — 화해했어요." }
    ],
    nuance:"긴 이야기를 짧게 압축해서 결론만 말할게요라는 신호예요. 복잡한 상황을 전부 설명하기 어렵거나 상대방 시간을 아끼고 싶을 때 씁니다. 이야기 도중 설명이 길어지다가 'Long story short...'으로 핵심으로 넘어가는 방식으로도 써요." },
  { id:58, cat:"filler", level:"beginner", en:"Kind of / Sort of", ko:"좀 / 어느 정도 / 약간",
    examples:[
      { en:"It was kind of awkward, to be honest.", ko:"솔직히 좀 어색했어요." },
      { en:"I'm sort of tired but I'll come anyway.", ko:"좀 피곤하긴 한데 그래도 갈게요." },
      { en:"She's kind of the leader of the group — everyone listens to her.", ko:"그녀가 어느 정도 그룹 리더예요 — 다들 그녀 말을 들어요." }
    ],
    nuance:"'Kind of'와 'Sort of'는 거의 같은 의미로, 확신이나 강도를 약화시키는 완충제 역할을 하는 필러예요. 직접적으로 말하기 불편하거나 100% 확신이 없을 때 부드럽게 표현해줘요. 구어에서 'kinda', 'sorta'로 줄여서도 자주 써요." },
],

sentences: [
  // 인사
  { id:101, cat:"greeting", en:"Long time no see! How have you been?", ko:"오랜만이에요! 어떻게 지내셨어요?", note:"사실 문법적으로 맞지 않는 표현이지만 오랫동안 굳어진 관용 표현이에요. 'How have you been?'은 'How are you?'보다 '오랫동안 어떻게 지내셨어요?'라는 기간의 뉘앙스가 담겨 있어요." },
  { id:102, cat:"greeting", en:"It's so good to finally meet you in person.", ko:"드디어 직접 만나게 되어서 정말 반가워요.", note:"'In person'이 핵심이에요. 이메일·채팅·화상통화로만 알던 사람을 실제로 처음 만났을 때 써요. 'Nice to meet you'보다 훨씬 따뜻하고 진심 어린 느낌이에요." },
  { id:103, cat:"greeting", en:"I've heard so much about you!", ko:"정말 말씀 많이 들었어요!", note:"상대방에 대한 이야기를 많이 들어서 이미 친근하다는 뉘앙스예요. 대부분 좋은 얘기를 들었다는 긍정적인 함의가 있어요. 상대방이 'I hope it was all good!'이라고 답하는 경우가 많아요." },
  { id:104, cat:"greeting", en:"How's everything going?", ko:"다 잘 되어가고 있나요?", note:"'How are you?'는 형식적으로 들릴 수 있어요. 'How's everything going?'은 일·생활·관계 등 전반적인 상황을 묻는 더 자연스러운 표현이에요. 'How are things going?'도 같은 의미로 자주 써요." },
  { id:105, cat:"greeting", en:"I'm doing pretty well, thanks for asking.", ko:"꽤 잘 지내고 있어요, 물어봐 줘서 고마워요.", note:"'Fine, thank you'는 너무 딱딱해요. 'Pretty well'은 '꽤 잘 지내고 있어요'라는 자연스럽고 긍정적인 답변이에요. 'Thanks for asking'을 추가하면 상대방에 대한 관심과 예의가 함께 전해져요." },
  { id:106, cat:"greeting", en:"Take care! Talk soon.", ko:"잘 지내요! 곧 또 얘기해요.", note:"'Goodbye'나 'See you'보다 더 친근하고 상대방을 걱정하는 따뜻한 작별 인사예요. 'Talk soon'은 다음에 또 연락하자는 열린 뉘앙스로, 특히 친구 사이나 캐주얼한 관계에서 자주 써요." },

  // 일상 대화
  { id:107, cat:"smalltalk", en:"The weather's been all over the place lately.", ko:"요즘 날씨가 도무지 종잡을 수가 없어요.", note:"'All over the place'는 '들쑥날쑥하다, 종잡을 수 없다'는 표현이에요. 갑자기 더웠다 추웠다 하는 날씨에 딱 맞는 표현으로, 대화를 가볍게 시작하는 스몰토크에 자주 써요." },
  { id:108, cat:"smalltalk", en:"Did you catch the game last night?", ko:"어제 밤 경기 봤어요?", note:"'Watch'가 아니라 'catch'예요. 'Catch'는 바쁜 중에 틈을 내서 봤다는 뉘앙스가 있어요. 스포츠를 화제로 대화를 자연스럽게 시작할 때 가장 많이 쓰는 표현이에요." },
  { id:109, cat:"smalltalk", en:"I've been really into cooking lately.", ko:"요즘 요리에 완전히 빠져있어요.", note:"'I'm interested in cooking'보다 훨씬 생생한 표현이에요. 'Be into something'은 '~에 빠져 있다, 열중하다'는 뜻으로, 최근 새로 열정을 갖게 된 취미나 관심사를 이야기할 때 딱 맞아요." },
  { id:110, cat:"smalltalk", en:"That show is so addictive — I stayed up until 2am.", ko:"그 드라마 너무 중독적이에요 — 새벽 2시까지 봤어요.", note:"'Addictive'는 '중독성 있다'는 뜻으로 재미있는 드라마·게임·음식에 자주 써요. 'I can't stop watching'보다 한 단어로 얼마나 빠져들었는지 생생하게 표현해줘요." },
  { id:111, cat:"smalltalk", en:"You should definitely check it out — it's worth it.", ko:"꼭 한번 봐봐요 — 볼 가치가 있어요.", note:"'Check it out'은 영화, 맛집, 음악, 장소 등 다양한 것을 추천할 때 쓰는 캐주얼한 표현이에요. 'You should watch it'보다 훨씬 자연스럽고, 'definitely'를 붙이면 적극 추천의 느낌이 강해져요." },
  { id:112, cat:"smalltalk", en:"I can't believe how fast this year has gone by.", ko:"올해가 얼마나 빨리 지나갔는지 믿기지 않아요.", note:"'Gone by'는 시간이 지나갔다는 자연스러운 표현이에요. 'The year went by so fast'보다 자연스럽고, 'I can't believe'를 앞에 붙이면 믿기지 않는다는 감탄의 뉘앙스가 더해져요." },

  // 직장/비즈니스
  { id:113, cat:"work", en:"Could you run me through the main points?", ko:"주요 내용 간단히 설명해 주실 수 있을까요?", note:"'Run through'는 빠르게 훑어 설명한다는 뉘앙스예요. 전체를 자세히 설명해달라는 게 아니라 핵심만 빠르게 정리해달라는 느낌이에요. 'Explain'보다 훨씬 원어민스럽고 자연스러운 요청이에요." },
  { id:114, cat:"work", en:"I'll get back to you on that by end of day.", ko:"오늘 안으로 답변 드릴게요.", note:"'Get back to'는 '다시 연락하다, 답변하다'는 의미예요. 'I'll reply'보다 훨씬 자연스러운 비즈니스 표현이에요. 'By end of day(EOD)'는 '오늘 업무 종료 전까지'라는 표현으로 직장 메일에서 매우 자주 써요." },
  { id:115, cat:"work", en:"Let's schedule a quick call to align on this.", ko:"이 부분 맞추게 잠깐 통화 일정 잡아요.", note:"'Align'은 의견이나 방향을 일치시킨다는 뜻이에요. 단순한 통화가 아니라 생각을 맞추기 위한 통화라는 목적이 명확해요. 'Quick call'은 긴 회의가 아니라 짧게 얘기하자는 부담 없는 표현이에요." },
  { id:116, cat:"work", en:"Could you send over the report when you get a chance?", ko:"시간 나실 때 보고서 보내주실 수 있을까요?", note:"'Send over'는 파일·문서를 보내는 자연스러운 표현이에요. 'When you get a chance'는 '시간 날 때'라는 뜻으로, 급하지 않다는 여유로운 뉘앙스를 줘요. 직접적인 요청이지만 상대방을 배려하는 느낌이에요." },
  { id:117, cat:"work", en:"We're on track to meet the deadline.", ko:"마감일 맞출 수 있도록 순조롭게 진행 중이에요.", note:"'On track'은 '계획대로 진행 중'이라는 표현이에요. 'We will meet the deadline'보다 현재 상태를 강조하는 표현으로, 프로젝트 진행 상황을 보고할 때 자주 써요. 반대로 'off track'은 '계획에서 벗어났다'는 의미예요." },
  { id:118, cat:"work", en:"That's a great point — I hadn't thought of it that way.", ko:"좋은 지적이에요 — 그런 관점으로 생각해 본 적이 없었어요.", note:"상대방 의견을 진심으로 인정하고 새로운 시각을 얻었다는 표현이에요. 'You're right'보다 구체적이고, 상대방을 높여주는 뉘앙스가 있어요. 미팅·토론에서 긍정적인 분위기를 만들 때 효과적이에요." },

  // 여행
  { id:119, cat:"travel", en:"Could you recommend a good local restaurant nearby?", ko:"근처 좋은 현지 음식점 추천해 주실 수 있나요?", note:"'Could you ~?'는 'Can you ~?'보다 더 공손한 요청이에요. 'Local'을 넣으면 관광객 식당이 아닌 현지인들이 가는 진짜 맛집을 원한다는 뉘앙스가 돼요." },
  { id:120, cat:"travel", en:"How long does it take to get there by subway?", ko:"지하철로 거기까지 얼마나 걸리나요?", note:"교통수단을 'by subway/bus/car'처럼 'by + 교통수단'으로 표현하는 게 자연스러워요. 'take'는 시간이 걸린다는 의미로, 'How long does it take?'는 여행 중 가장 자주 쓰는 패턴이에요." },
  { id:121, cat:"travel", en:"Is this seat taken?", ko:"이 자리 주인 있나요?", note:"자리가 비어 있어 보여도 누군가 사용 중인지 확인하는 표현이에요. 'Taken'은 '사용 중이다, 임자가 있다'는 의미예요. 'Does someone sit here?'보다 훨씬 자연스럽고 원어민스러운 표현이에요." },
  { id:122, cat:"travel", en:"Could I get a window seat, please?", ko:"창가 자리로 주실 수 있을까요?", note:"항공기·기차·식당에서 모두 쓸 수 있어요. 'Could I get'은 'I want'보다 훨씬 공손한 요청 방식이에요. 통로 쪽 자리는 'aisle seat'이라고 해요." },
  { id:123, cat:"travel", en:"I think I'm lost — could you point me in the right direction?", ko:"길을 잃은 것 같은데 — 방향 좀 알려주실 수 있나요?", note:"'I think I'm lost'는 '길을 잃은 것 같다'고 조심스럽게 인정하는 표현이에요. 'Point me in the right direction'은 정확한 길 안내가 아니더라도 방향만 알려달라는 부탁이에요. 부담을 줄인 자연스러운 요청이에요." },

  // 감정
  { id:124, cat:"feelings", en:"I'm absolutely thrilled about the news!", ko:"그 소식에 정말 너무 기뻐요!", note:"'Thrilled'는 'excited'보다 훨씬 강한 기쁨·흥분을 표현해요. 'I'm so happy'가 평범하다면, 'I'm absolutely thrilled'는 '정말 너무너무 기쁘다'는 최고 수준의 감정 표현이에요." },
  { id:125, cat:"feelings", en:"I'm a bit overwhelmed right now.", ko:"지금 좀 벅차요 / 버거워요.", note:"'Overwhelmed'는 감당하기 힘들 만큼 압도당한 상태예요. 기쁨으로 벅찰 때도, 스트레스로 버거울 때도 모두 써요. 'I'm a bit'을 붙이면 '좀'이라는 완충 표현이 되어 더 자연스러워요." },
  { id:126, cat:"feelings", en:"That really means a lot to me.", ko:"그 말이 정말 많이 와닿아요.", note:"누군가의 말·행동·선물이 크게 감동되었을 때 쓰는 진심 어린 표현이에요. 'Thank you'만 하면 가볍게 들릴 수 있는데, 'That really means a lot to me'를 더하면 상대방의 마음이 진심으로 전달됐다는 느낌을 줘요." },
  { id:127, cat:"feelings", en:"Honestly, I'm a little nervous about it.", ko:"솔직히 좀 긴장되네요.", note:"'I'm nervous'는 직접적이지만, 'Honestly, I'm a little nervous'는 솔직하게 인정하는 뉘앙스예요. 'Honestly'로 시작하면 진솔한 감정을 공유하는 느낌이 들어 상대방과 친밀감이 생겨요." },
  { id:128, cat:"feelings", en:"I couldn't be happier with how it turned out.", ko:"이렇게 잘 됐으면 더 이상 바랄 게 없어요.", note:"이중 부정으로 최고의 만족감을 표현하는 고급 표현이에요. 'I'm very happy'보다 훨씬 강렬하고, 결과에 대해 '이보다 더 행복할 수 없다'는 완전한 만족을 나타내요." },

  // 사과/부탁
  { id:129, cat:"apology", en:"I'm so sorry — that was completely my fault.", ko:"정말 미안해요 — 완전히 제 잘못이에요.", note:"'I'm so sorry'는 진심 어린 사과이고, 'that was completely my fault'는 변명 없이 책임을 완전히 인정하는 표현이에요. 두 문장을 함께 쓰면 진지하고 성의 있는 사과가 돼요." },
  { id:130, cat:"apology", en:"I apologize for the short notice.", ko:"갑작스럽게 연락드려서 죄송해요.", note:"'Short notice'는 '갑작스러운, 촉박한 공지'라는 의미예요. 급하게 연락하거나 늦게 통보할 때 앞에 붙이는 표현이에요. 이메일에서 'I apologize for the late notice'도 자주 써요." },
  { id:131, cat:"apology", en:"Would you mind if I asked you a favor?", ko:"부탁 하나 드려도 될까요?", note:"'Would you mind if ~?'는 상대방에게 불편함을 줄지 먼저 확인하는 매우 공손한 표현이에요. 'Can I ask you a favor?'보다 격식 있고, 상대방이 거절하기 편한 여지를 주는 배려가 담겨 있어요." },
  { id:132, cat:"apology", en:"I really appreciate your patience on this.", ko:"이 부분에 대해 인내해 주셔서 정말 감사해요.", note:"처리가 늦어졌거나 상대방이 기다려줬을 때 쓰는 감사 표현이에요. 'Thank you for waiting'보다 훨씬 세련되고, 'patience'라는 단어를 써서 상대방의 인내심을 진심으로 인정해줘요." },

  // 전화/문자
  { id:133, cat:"phone", en:"Hey, is this a good time to talk?", ko:"지금 통화 가능해요?", note:"전화하기 전에 상대방이 바쁜지 먼저 확인하는 배려 있는 표현이에요. 'Can you talk now?'보다 훨씬 자연스럽고, 이 표현을 쓰면 원어민스럽다는 인상을 줘요." },
  { id:134, cat:"phone", en:"Can I call you back in like 10 minutes?", ko:"10분 후에 제가 다시 전화해도 될까요?", note:"'Like'는 '대략, 약'이라는 뜻으로 정확한 시간이 아님을 표시하는 구어 필러예요. 'Approximately'보다 훨씬 자연스러워요. 지금 당장 통화가 어려울 때 상대방을 배려하는 표현이에요." },
  { id:135, cat:"phone", en:"Sorry, you're breaking up — can you say that again?", ko:"죄송한데 전화가 끊겨요 — 다시 말씀해 주실 수 있나요?", note:"'Breaking up'은 통화 신호가 끊기거나 목소리가 잘 들리지 않을 때 쓰는 표현이에요. 'The connection is bad'보다 훨씬 자연스럽고, 전화통화 중 음질 문제를 설명할 때 가장 많이 써요." },
  { id:136, cat:"phone", en:"Just checking in — how are you holding up?", ko:"안부 확인차요 — 어떻게 지내고 있어요?", note:"'Just checking in'은 특별한 용건 없이 안부를 묻는 가벼운 표현이에요. 'How are you holding up?'은 어려운 상황이나 힘든 시기에 '잘 버티고 있어요?'라는 뉘앙스로 걱정을 담은 안부 표현이에요." },

  // 인사 추가
  { id:137, cat:"greeting", en:"You look great! Have you done something different?", ko:"좋아 보여요! 뭔가 달라진 거 있어요?", note:"외모나 분위기가 좋아 보일 때 쓰는 따뜻한 칭찬이에요. 'Have you done something different?'는 구체적으로 뭔지 모르지만 긍정적으로 달라졌다는 감상을 전하는 자연스러운 표현이에요." },
  { id:138, cat:"greeting", en:"It was great catching up with you!", ko:"오랜만에 얘기 나눠서 정말 좋았어요!", note:"'Catch up'은 오랫동안 못 본 사람과 서로 근황을 나눈다는 의미예요. 'It was nice talking to you'보다 훨씬 따뜻하고 친근한 표현으로, 오랜만에 만나고 헤어질 때 자주 써요." },

  // 일상 대화 추가
  { id:139, cat:"smalltalk", en:"I've been meaning to try that place forever.", ko:"거기 진짜 오래전부터 가보려고 했었어요.", note:"'I've been meaning to'는 전부터 하려고 했는데 아직 못 했다는 뉘앙스예요. 'For forever'는 '정말 오랫동안'이라는 구어 과장 표현이에요. 맛집·카페·명소 등을 화제로 스몰토크할 때 자주 써요." },
  { id:140, cat:"smalltalk", en:"How did that turn out?", ko:"결국 어떻게 됐어요?", note:"'Turn out'은 결과가 어떻게 됐는지 묻는 표현이에요. 상대방이 이전에 언급한 상황이나 사건의 결말이 궁금할 때 써요. 'What happened in the end?'보다 훨씬 자연스러운 대화 이어받기 표현이에요." },
  { id:141, cat:"smalltalk", en:"That's exactly how I feel too.", ko:"저도 정확히 그렇게 느껴요.", note:"'Exactly'를 붙이면 공감의 강도가 훨씬 높아져요. 단순히 'Me too'보다 '정확히 그 감정이에요!'라는 강한 공감을 표현해요. 대화 중 상대방과 생각이 일치할 때 써요." },
  { id:142, cat:"smalltalk", en:"Time really flies when you're having fun.", ko:"즐거울 때는 시간이 정말 빨리 가요.", note:"'Time flies'는 '시간이 날아간다'는 영어 속담이에요. 즐거웠던 시간이 빠르게 지나갔다는 감상을 나누거나, 스몰토크를 마무리할 때 자주 써요." },

  // 직장/비즈니스 추가
  { id:143, cat:"work", en:"Can I get your thoughts on this?", ko:"이것에 대한 의견을 들을 수 있을까요?", note:"'Thoughts'는 의견이나 생각을 뜻해요. 'What do you think?'보다 살짝 더 격식 있고, 피드백이나 검토 의견을 정중하게 요청할 때 비즈니스에서 자주 써요." },
  { id:144, cat:"work", en:"Let me loop you in on this.", ko:"이 건에 대해 같이 공유할게요.", note:"'Loop in'은 정보·대화에 포함시키다는 뜻이에요. 이메일에서 누군가를 CC에 추가하거나 대화에 포함시킬 때 써요. 'Let me include you'보다 훨씬 원어민스럽고 자연스러운 직장 표현이에요." },
  { id:145, cat:"work", en:"I'll take the lead on this one.", ko:"이건 제가 이끌어 볼게요.", note:"'Take the lead'는 '주도하다, 앞에 나서다'는 표현이에요. 'I'll be in charge'보다 더 적극적으로 책임지겠다는 뉘앙스예요. 자발적으로 프로젝트·태스크를 맡겠다고 할 때 써요." },
  { id:146, cat:"work", en:"Could we push the meeting back by an hour?", ko:"미팅을 한 시간 뒤로 미룰 수 있을까요?", note:"'Push back'은 일정을 뒤로 미룬다는 표현이에요. 반대로 일정을 앞당길 때는 'push forward' 또는 'move up'이라고 해요. 'Postpone'보다 훨씬 자연스럽고 원어민스러운 비즈니스 표현이에요." },

  // 여행 추가
  { id:147, cat:"travel", en:"What's the best way to get to the city center?", ko:"시내 중심까지 가는 가장 좋은 방법이 뭔가요?", note:"'The best way to get to ~'는 목적지까지 가는 방법을 묻는 자연스러운 표현이에요. 'How do I go to ~?'보다 훨씬 원어민스럽고, 여행 중 현지인에게 물어보기 딱 좋아요." },
  { id:148, cat:"travel", en:"Could you take a photo of us, please?", ko:"저희 사진 좀 찍어주실 수 있나요?", note:"여행 중 사진을 부탁할 때 가장 자연스러운 표현이에요. 'Take a photo'가 자연스럽고, 'photograph'는 너무 격식 있어요. 'Could you~?'로 공손하게 요청하는 것이 포인트예요." },
  { id:149, cat:"travel", en:"Is there an entrance fee?", ko:"입장료가 있나요?", note:"관광지·박물관·공원 등에서 쓰는 실용적인 표현이에요. 'Fee'는 서비스에 대한 요금을 뜻해요. 'Do I have to pay?'보다 훨씬 자연스럽고 정확한 표현이에요." },
  { id:150, cat:"travel", en:"I'd like to check in, please. I have a reservation under Kim.", ko:"체크인하고 싶어요. Kim으로 예약했어요.", note:"호텔 체크인 시 가장 기본적인 표현이에요. 'I have a reservation under ~'는 '~이름으로 예약했어요'라는 뜻이에요. 'My name is Kim'보다 더 직접적이고 자연스럽게 예약 정보를 알려주는 방식이에요." },

  // 감정 추가
  { id:151, cat:"feelings", en:"I'm on top of the world right now!", ko:"지금 너무 기분이 최고예요!", note:"세상 꼭대기에 있는 것처럼 기분이 최고라는 강한 표현이에요. 'I'm very happy'보다 훨씬 생동감 있고, 특별히 좋은 일이 생겼을 때 기쁨을 과장해서 표현하고 싶을 때 써요." },
  { id:152, cat:"feelings", en:"I'm not feeling myself today.", ko:"오늘 좀 컨디션이 이상해요.", note:"'Feel myself'는 '평소의 나답다'는 의미예요. 'I'm not feeling myself'는 몸이 아프거나 기분이 우울하거나 컨디션이 안 좋을 때 두루 쓸 수 있는 표현이에요. 구체적으로 뭐가 문제인지 말하지 않아도 돼요." },
  { id:153, cat:"feelings", en:"I'm over the moon about the news.", ko:"그 소식에 너무 너무 기뻐요.", note:"'Over the moon'은 달을 넘어설 만큼 기쁘다는 과장 표현이에요. 'I'm very happy'보다 훨씬 강렬하고 시적인 표현으로, 특별히 좋은 소식(취직, 합격, 임신 등)을 들었을 때 써요." },

  // 사과/부탁 추가
  { id:154, cat:"apology", en:"I should have told you sooner — I'm sorry.", ko:"더 일찍 말했어야 했는데 — 미안해요.", note:"'Should have + 과거분사'는 '~했어야 했는데 (안 했다)'는 후회를 나타내요. 사과와 자기반성을 동시에 표현하는 자연스러운 방식이에요. 뒤에 'I'm sorry'를 붙이면 진정성이 더 전달돼요." },
  { id:155, cat:"apology", en:"Do you think you could do me a favor?", ko:"부탁 하나 들어줄 수 있어요?", note:"'Do you think you could ~?'는 'Could you ~?'보다 한 단계 더 부드럽게 상대방에게 여지를 주는 표현이에요. 'Would you mind ~?'보다 살짝 더 캐주얼하고, 친구·동료에게 자연스럽게 부탁할 때 써요." },
  { id:156, cat:"apology", en:"I didn't mean it that way — let me explain.", ko:"그런 의도가 아니었어요 — 설명할게요.", note:"'I didn't mean it that way'는 말이 잘못 전달됐을 때 의도를 해명하는 표현이에요. 오해가 생겼을 때 방어적으로 들리지 않으면서 상황을 부드럽게 정정할 수 있어요." },

  // 전화/문자 추가
  { id:157, cat:"phone", en:"You're on speaker, just so you know.", ko:"지금 스피커폰이에요, 참고로요.", note:"통화 중 스피커폰을 켰을 때 상대방에게 알리는 배려 표현이에요. 'Just so you know'는 '참고로 알아두세요'라는 의미의 필러예요. 다른 사람이 함께 있을 때 미리 알리는 에티켓이에요." },
  { id:158, cat:"phone", en:"Let me know when you're free and we can hop on a call.", ko:"시간 날 때 알려줘요, 잠깐 통화해요.", note:"'Hop on a call'은 통화에 '훌쩍 올라타다'는 이미지로, 부담 없이 잠깐 통화하자는 캐주얼한 표현이에요. 'Can we have a phone call?'보다 훨씬 가볍고 자연스러워요." },
  { id:159, cat:"phone", en:"I'll shoot you a text when I'm on my way.", ko:"출발할 때 문자 보낼게요.", note:"'Shoot you a text'는 '문자를 쏴줄게'라는 생생한 표현이에요. 'Send you a message'보다 훨씬 캐주얼하고 원어민스러워요. 'On my way'는 '이미 이동 중'이라는 의미로 약속 장소로 가는 중임을 전할 때 써요." },
  { id:160, cat:"phone", en:"I didn't get your last message — could you resend it?", ko:"마지막 메시지가 안 왔는데 — 다시 보내줄 수 있어요?", note:"문자·카카오톡·이메일 등에서 메시지를 못 받았을 때 쓰는 표현이에요. 'Resend'는 '다시 보내다'는 뜻이에요. 'I didn't receive it'보다 자연스럽고 직접적인 요청이에요." },
],

quiz: [
  { type:"mc", prompt:"'몸이 좀 좋지 않다'를 가장 자연스럽게 표현하면?",
    answer:"I'm feeling under the weather.",
    options:["I'm feeling under the weather.", "I'm feeling below the sky.", "I'm not in my body.", "I feel bad outside."],
    explain:"'Under the weather'는 날씨 아래 있는 것처럼 몸 상태가 좋지 않다는 완곡한 표현이에요. 'I'm sick'은 직접적이지만 다소 심각하게 들릴 수 있는 반면, 'under the weather'는 '좀 컨디션이 안 좋아요' 정도의 부드러운 뉘앙스예요." },
  { type:"fill", prompt:"We need to ___ the ball rolling on this project ASAP.",
    answer:"get", hint:"일을 시작하다는 표현의 일부", options:["get", "start", "make", "bring"],
    explain:"'Get the ball rolling'은 공을 굴리기 시작하면 탄력이 붙듯 '일을 시작하다'는 관용 표현이에요. 'start'는 문법적으로 쓸 수 있지만, 이 숙어는 반드시 'get'과 함께 써야 해요." },
  { type:"mc", prompt:"회의에서 '바로 본론으로 가겠습니다'를 자연스럽게 말하면?",
    answer:"Let me cut to the chase.", options:["Let me cut to the chase.", "Let me go to the point.", "Let me be direct point.", "Let me skip to main."],
    explain:"'Cut to the chase'는 영화에서 긴 장면 없이 바로 추격 장면으로 넘어가라는 말에서 유래했어요. 'Get to the point'도 비슷하지만 'cut to the chase'가 훨씬 원어민스럽고 생생한 표현이에요." },
  { type:"fill", prompt:"Sorry I'm late! — No ___ at all!",
    answer:"worries", hint:"괜찮다는 표현", options:["worries", "problem", "trouble", "issue"],
    explain:"'No worries'는 'It's okay'보다 훨씬 자연스럽고 따뜻한 표현이에요. 'problem'도 'No problem'으로 쓰일 수 있지만, 'No worries'가 호주·영국·미국 모두에서 더 널리 쓰이는 친근한 표현이에요." },
  { type:"mc", prompt:"'갑자기 연락을 끊었다'는 요즘 슬랭으로?",

const CAT_LABEL = {
  daily:'일상 회화', biz:'비즈니스', idiom:'숙어', slang:'슬랭', filler:'필러 표현',
  greeting:'인사', smalltalk:'일상 대화', work:'직장/비즈니스',
  travel:'여행', feelings:'감정', apology:'사과/부탁', phone:'전화/문자'
};

const LEVEL_LABEL = { beginner:'초급', intermediate:'중급', advanced:'고급' };
function levelBadgeClass(level) {
  return { beginner:'level-beginner', intermediate:'level-intermediate', advanced:'level-advanced' }[level] || '';
}

function catBadgeClass(cat) {
  return { daily:'cat-daily', biz:'cat-biz', idiom:'cat-idiom', slang:'cat-slang', filler:'cat-filler' }[cat] || '';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

const SECS = ['home','phrases','sentences','quiz','bookmarks'];
let currentSec = 'home';
let shuffledPhrases   = [];
let shuffledSentences = [];

function showSection(id) {
  SECS.forEach(s => {
    document.getElementById('sec-'+s).classList.toggle('active', s===id);
  });
  document.querySelectorAll('.nav-btn, .bn-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sec===id);
  });
  currentSec = id;
  if (id==='home') {
    renderHome();
  }
  if (id==='phrases') {
    shuffledPhrases = shuffle(DATA.phrases);   // 진입할 때마다 순서 랜덤
    renderPhrases();
  }
  if (id==='sentences') {
    shuffledSentences = shuffle(DATA.sentences); // 진입할 때마다 순서 랜덤
    renderSentences();
  }
  if (id==='quiz') {
    // 진행 중이든 아니든 항상 시작 화면으로 리셋
    quizState.phase = 'idle';
    renderQuizStart();
  }
  if (id==='bookmarks') {
    renderBookmarks();
  }
}

let currentPhraseCat   = 'all';
let currentLevelFilter = 'all';

function setPhraseFilter(cat) {
  currentPhraseCat = cat;
  document.querySelectorAll('#phrase-filters .filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat===cat);
  });
  renderPhrases();
}

function setLevelFilter(level) {
  currentLevelFilter = level;
  document.querySelectorAll('#level-filters .filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.level===level);
  });
  renderPhrases();
}

function togglePhraseBookmark(id) {
  if (phraseBm.has(id)) phraseBm.delete(id); else phraseBm.add(id);
  savePhraseBm();
  renderPhrases();
}

function renderPhrases() {
  const query = (document.getElementById('phrase-search')?.value || '').toLowerCase().trim();
  const src   = shuffledPhrases.length ? shuffledPhrases : DATA.phrases;
  let items   = currentPhraseCat==='all' ? src : src.filter(p=>p.cat===currentPhraseCat);
  if (currentLevelFilter !== 'all') items = items.filter(p => p.level===currentLevelFilter);
  if (query) {
    items = items.filter(p => p.en.toLowerCase().includes(query) || p.ko.includes(query));
  }
  document.getElementById('phrase-count').textContent = `총 ${items.length}개 표현`;
  document.getElementById('phrase-list').innerHTML = items.map(p => {
    const badgeCls  = catBadgeClass(p.cat);
    const levelCls  = levelBadgeClass(p.level);
    const isBm = phraseBm.has(p.id);
    const examplesHtml = p.examples.map((ex, i) => `
      <div class="ex-item">
        <div class="ex-en">${esc(ex.en)}</div>
        <div class="ex-ko">${esc(ex.ko)}</div>
      </div>`).join('');
    return `
      <div class="expr-card">
        <div class="expr-top">
          <div class="expr-en">${esc(p.en)}</div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
            <span class="level-badge ${levelCls}">${LEVEL_LABEL[p.level]||p.level}</span>
            <span class="cat-badge ${badgeCls}">${CAT_LABEL[p.cat]||p.cat}</span>
            <button class="bm-btn${isBm?' starred':''}" onclick="togglePhraseBookmark(${p.id})" title="즐겨찾기">${isBm?'★':'☆'}</button>
          </div>
        </div>
        <div class="expr-ko">${esc(p.ko)}</div>
        <div class="expr-example">${examplesHtml}</div>
        ${p.nuance ? `<div class="nuance-badge">${esc(p.nuance)}</div>` : ''}
      </div>`;
  }).join('') || '<div style="text-align:center;padding:30px;color:var(--text3)">검색 결과가 없어요</div>';
}

    return `
      <div class="sent-card">
        <div class="sent-top">
          <div>
            <div class="sent-en">${esc(s.en)}</div>
            <div class="sent-ko">${esc(s.ko)}</div>
            ${s.note ? `<span class="sent-note">${esc(s.note)}</span>` : ''}
          </div>
          <button class="bm-btn${isBm?' starred':''}" onclick="toggleBookmark(${s.id})" title="즐겨찾기">${isBm?'★':'☆'}</button>
        </div>
      </div>`;
  }).join('') || '<div style="text-align:center;padding:30px;color:var(--text3)">' + (bmFilterOn ? '즐겨찾기한 예문이 없어요 ☆' : '표시할 예문이 없어요') + '</div>';
}

/* ═══════════════════════════════════════════════
   BOOKMARKS
═══════════════════════════════════════════════ */
let currentBmTab = 'all';

function setBmTab(tab) {
  currentBmTab = tab;
  document.querySelectorAll('.bm-sec-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab===tab);
  });
  renderBookmarks();
}

function renderBookmarks() {
  const bmPhrases   = DATA.phrases.filter(p => phraseBm.has(p.id));
  const bmSentences = DATA.sentences.filter(s => bookmarks.has(s.id));

  let totalCount = 0;
  let html = '';

  if (currentBmTab !== 'sentences' && bmPhrases.length > 0) {
    totalCount += bmPhrases.length;
    if (currentBmTab === 'all') html += `<div class="count-label" style="margin-bottom:6px;font-weight:600;color:var(--text2)">표현/숙어 ${bmPhrases.length}개</div>`;
    html += bmPhrases.map(p => {
      const badgeCls = catBadgeClass(p.cat);
      const levelCls = levelBadgeClass(p.level);
      const examplesHtml = p.examples.map(ex => `
        <div class="ex-item">
          <div class="ex-en">${esc(ex.en)}</div>
          <div class="ex-ko">${esc(ex.ko)}</div>
        </div>`).join('');
      return `
        <div class="expr-card">
          <div class="expr-top">
            <div class="expr-en">${esc(p.en)}</div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
              <span class="level-badge ${levelCls}">${LEVEL_LABEL[p.level]||p.level}</span>
              <span class="cat-badge ${badgeCls}">${CAT_LABEL[p.cat]||p.cat}</span>
              <button class="bm-btn starred" onclick="removePhraseFromBm(${p.id})" title="저장 해제">★</button>
            </div>
          </div>
          <div class="expr-ko">${esc(p.ko)}</div>
          <div class="expr-example">${examplesHtml}</div>
          ${p.nuance ? `<div class="nuance-badge">${esc(p.nuance)}</div>` : ''}
        </div>`;
    }).join('');
  }

  if (currentBmTab !== 'phrases' && bmSentences.length > 0) {
    totalCount += bmSentences.length;
    if (currentBmTab === 'all' && bmPhrases.length > 0) html += `<div class="count-label" style="margin:14px 0 6px;font-weight:600;color:var(--text2)">예문 ${bmSentences.length}개</div>`;
    else if (currentBmTab === 'all') html += `<div class="count-label" style="margin-bottom:6px;font-weight:600;color:var(--text2)">예문 ${bmSentences.length}개</div>`;
    html += bmSentences.map(s => {
      return `
        <div class="sent-card">
          <div class="sent-top">
            <div>
              <div class="sent-en">${esc(s.en)}</div>
              <div class="sent-ko">${esc(s.ko)}</div>
              ${s.note ? `<span class="sent-note">${esc(s.note)}</span>` : ''}
            </div>
            <button class="bm-btn starred" onclick="removeSentFromBm(${s.id})" title="저장 해제">★</button>
          </div>
        </div>`;
    }).join('');
  }

  if (currentBmTab !== 'sentences') totalCount += (currentBmTab==='all' ? 0 : bmPhrases.length); // already counted
  const total = currentBmTab==='all' ? bmPhrases.length + bmSentences.length
              : currentBmTab==='phrases' ? bmPhrases.length : bmSentences.length;

  document.getElementById('bm-count').textContent = `총 ${total}개 저장됨`;

  if (total === 0) {
    html = `
      <div class="bm-empty">
        <div class="bm-empty-icon">☆</div>
        <div class="bm-empty-title">저장된 항목이 없어요</div>
        <div class="bm-empty-desc">표현이나 예문 카드의 ☆ 버튼을 눌러<br>즐겨찾기에 저장해 보세요.</div>
      </div>`;
  }
  document.getElementById('bm-list').innerHTML = html;
}

function removePhraseFromBm(id) {
  phraseBm.delete(id);
  savePhraseBm();
  renderBookmarks();
}

function removeSentFromBm(id) {
  bookmarks.delete(id);
  saveBm();
  renderBookmarks();
}

/* ═══════════════════════════════════════════════
   QUIZ
═══════════════════════════════════════════════ */
const quizState = {
  phase: 'idle',  // idle | playing | feedback | result
  pool:  [],
  index: 0,
  score: 0,
  total: 10
};

function renderQuizStart() {
  document.getElementById('quiz-content').innerHTML = `
    <div class="quiz-start card">
      <div class="quiz-start-icon">🎯</div>
      <div class="quiz-start-title">영어 퀴즈</div>
      <div class="quiz-start-desc">
        지금까지 배운 표현들을 테스트해 보세요!<br>
        매번 랜덤으로 10문제가 출제됩니다.
      </div>
      ${getBestScore()>0 ? `<div class="best-badge">최고 점수 ${getBestScore()} / 10</div>`:''}
      <button class="start-btn" onclick="startQuiz()">시작하기</button>
    </div>`;
}

function startQuiz() {
  quizState.pool  = shuffle(DATA.quiz).slice(0, quizState.total);
  quizState.index = 0;
  quizState.score = 0;
  quizState.phase = 'playing';
  renderQuestion();
}

function renderQuestion() {
  const item    = quizState.pool[quizState.index];
  const pct     = Math.round((quizState.index / quizState.total) * 100);
  const typeLabel = item.type==='fill' ? '빈칸 채우기' : '선택형';

  // Highlight blank in fill questions
  let promptHtml = esc(item.prompt);
  if (item.type==='fill') {
    promptHtml = promptHtml.replace(/___+/, '<span class="quiz-blank">_____</span>');
  }

  const optionsHtml = item.options.map(o => `
    <button class="opt-btn" onclick="checkAnswer(this)">${esc(o)}</button>
  `).join('');

  document.getElementById('quiz-content').innerHTML = `
    <div class="quiz-progress-bar"><div class="quiz-fill" style="width:${pct}%"></div></div>
    <div class="quiz-meta">${quizState.index+1} / ${quizState.total} · 현재 점수: ${quizState.score}</div>
    <div class="quiz-type-badge">${typeLabel}</div>
    <div class="quiz-prompt">${promptHtml}</div>
    ${item.hint ? `<div class="quiz-hint">힌트: ${esc(item.hint)}</div>` : ''}
    <div class="quiz-options">${optionsHtml}</div>
    <div class="quiz-feedback" id="quiz-fb"></div>
    <div id="quiz-next-wrap"></div>`;
}

function checkAnswer(btn) {
  const item = quizState.pool[quizState.index];
  const selected = btn.textContent.trim();
  const correct  = selected.toLowerCase() === item.answer.trim().toLowerCase();
  if (correct) quizState.score++;

  // Disable all buttons and mark correct/wrong
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    // Compare text content to answer
    const bText = b.textContent.trim().toLowerCase();
    if (bText === item.answer.trim().toLowerCase()) b.classList.add('correct');
    else if (b === btn && !correct) b.classList.add('wrong');
  });

  // Feedback
  const fb = document.getElementById('quiz-fb');
  fb.className = 'quiz-feedback show ' + (correct ? 'correct-fb' : 'wrong-fb');
  const explainHtml = item.explain ? `<div class="quiz-explain">${esc(item.explain)}</div>` : '';
  fb.innerHTML = correct
    ? `<div class="feedback-result">✅ 정답이에요!</div>정답: <strong>${esc(item.answer)}</strong>${explainHtml}`
    : `<div class="feedback-result">❌ 틀렸어요</div>정답: <strong>${esc(item.answer)}</strong>${explainHtml}`;

  // Next button
  const isLast = quizState.index+1 >= quizState.total;
  document.getElementById('quiz-next-wrap').innerHTML = `
    <button class="next-btn" onclick="${isLast?'showResult()':'nextQuestion()'}">${isLast?'결과 보기':'다음 문제 →'}</button>`;

  quizState.phase = 'feedback';
}

function nextQuestion() {
  quizState.index++;
  quizState.phase = 'playing';
  renderQuestion();
}

function showResult() {
  const s = quizState.score;
  const t = quizState.total;
  const best = Math.max(s, getBestScore());
  setBestScore(best);

  let grade, desc;
  if (s >= 9)       { grade = '🏆 원어민급!';    desc = '완벽해요! 정말 대단해요.'; }
  else if (s >= 7)  { grade = '🌟 훌륭해요!';    desc = '원어민 표현을 잘 익히고 있어요!'; }
  else if (s >= 5)  { grade = '👍 잘 하고 있어요!'; desc = '조금만 더 연습하면 완벽해질 거예요.'; }
  else if (s >= 3)  { grade = '📚 더 연습해요';  desc = '표현들을 다시 한 번 복습해 보세요.'; }
  else              { grade = '🌱 시작이 반!';   desc = '처음부터 차근차근 해봐요. 할 수 있어요!'; }

  document.getElementById('quiz-content').innerHTML = `
    <div class="quiz-result card">
      <div style="font-size:13px;color:var(--text3);margin-bottom:4px">최종 결과</div>
      <div class="result-score">${s}</div>
      <div class="result-total">/ ${t} 문제</div>
      <div class="result-grade">${grade}</div>
      <div class="result-desc">${desc}</div>
      <div class="best-score">최고 점수: ${best} / ${t}</div>
      <button class="replay-btn" onclick="startQuiz()">다시 풀기</button>
    </div>`;
  quizState.phase = 'result';
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
renderHome();
renderPhrases();
renderSentences();
</script>
