<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어 회화 공부</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Monochrome palette ── */
  --bg:        #F8F8F8;
  --surface:   #FFFFFF;
  --surface2:  #F2F2F2;
  --surface3:  #EBEBEB;
  --border:    #E4E4E4;
  --border2:   #CACACA;
  --text1:     #0D0D0D;
  --text2:     #505050;
  --text3:     #9A9A9A;

  /* Brand = black */
  --brand:       #0D0D0D;
  --brand-hover: #2A2A2A;
  --brand-light: #F0F0F0;

  /* Category badges — monochrome differentiated */
  --cat-daily-bg:  #F0F0F0; --cat-daily-fg:  #1A1A1A;
  --cat-biz-bg:    #1A1A1A; --cat-biz-fg:    #FFFFFF;
  --cat-idiom-bg:  #0D0D0D; --cat-idiom-fg:  #F8F8F8;
  --cat-slang-bg:  #E0E0E0; --cat-slang-fg:  #1A1A1A;
  --cat-filler-bg: #FFFFFF; --cat-filler-fg: #505050;

  /* Quiz feedback */
  --correct-bg: #0D0D0D; --correct-fg: #FFFFFF;
  --wrong-bg:   #F0F0F0; --wrong-fg:   #9A9A9A;

  /* Misc */
  --tip-bg:    #F2F2F2; --tip-fg:    #303030;
  --nuance-bg: #EBEBEB; --nuance-fg: #404040;
  --r1: 6px; --r2: 10px; --r3: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 8px rgba(0,0,0,0.04);
}

html { font-size: 14px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo',
               'Noto Sans KR', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text1);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  background: var(--brand);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-logo  { font-size: 18px; line-height: 1; }
.header-title {
  font-size: 14px;
  font-weight: 700;
  color: #FFFFFF;
  letter-spacing: 0.02em;
}
.header-sub { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; letter-spacing: 0.03em; }
.header-left  { display: flex; align-items: center; gap: 10px; }
.header-badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 3px 8px;
  border-radius: 4px;
}

/* ── NAV ── */
.nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: center;
  gap: 2px;
  padding: 10px 16px;
  position: sticky;
  top: 52px;
  z-index: 99;
}
.nav-btn {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
  padding: 7px 18px;
  border: 1px solid transparent;
  border-radius: 6px;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.nav-btn:hover  { background: var(--surface2); color: var(--text1); }
.nav-btn.active { background: var(--brand); color: #FFFFFF; border-color: var(--brand); }

/* ── CONTENT ── */
.content { max-width: 680px; margin: 0 auto; padding: 24px 16px 64px; }

/* ── SECTION ── */
.section { display: none; }
.section.active { display: block; }

/* ── CARD BASE ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r3);
  padding: 18px 20px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}

/* ── HOME HERO ── */
.home-hero {
  background: var(--brand);
  border-radius: var(--r3);
  padding: 28px 24px 24px;
  margin-bottom: 12px;
  color: #FFFFFF;
  position: relative;
  overflow: hidden;
}
.home-hero::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.home-hero::after {
  content: '';
  position: absolute;
  bottom: -20px; right: 20px;
  width: 90px; height: 90px;
  border-radius: 50%;
  background: rgba(255,255,255,0.03);
}
.hero-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.hero-label::before {
  content: '';
  display: inline-block;
  width: 16px; height: 1px;
  background: rgba(255,255,255,0.3);
}
.hero-en {
  font-size: 24px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 6px;
  letter-spacing: -0.3px;
}
.hero-ko { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 18px; }
.hero-example {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--r2);
  padding: 12px 14px;
  font-size: 12.5px;
  line-height: 1.65;
}
.hero-example .ex-en { font-weight: 500; margin-bottom: 3px; color: rgba(255,255,255,0.9); }
.hero-example .ex-ko { color: rgba(255,255,255,0.5); font-size: 12px; }

/* ── TIP CARD ── */
.tip-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 14px 16px;
  margin-bottom: 12px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  box-shadow: var(--shadow);
}
.tip-icon  { font-size: 15px; flex-shrink: 0; margin-top: 1px; opacity: 0.7; }
.tip-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 5px;
}
.tip-body  { font-size: 13px; color: var(--text2); line-height: 1.65; }

/* ── STATS ── */
.stats-row { display: flex; gap: 8px; margin-bottom: 12px; }
.stat-pill {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 14px 10px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-num { font-size: 24px; font-weight: 800; color: var(--text1); letter-spacing: -0.5px; }
.stat-lbl { font-size: 10px; color: var(--text3); margin-top: 3px; letter-spacing: 0.04em; text-transform: uppercase; }

/* ── HOME NAV GRID ── */
.home-nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.home-nav-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 16px;
  cursor: pointer;
  transition: all 0.18s;
  box-shadow: var(--shadow);
}
.home-nav-card:hover {
  border-color: var(--brand);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}
.hnc-icon  { font-size: 20px; margin-bottom: 8px; }
.hnc-title { font-size: 13px; font-weight: 700; color: var(--text1); }
.hnc-desc  { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* ── DIVIDER ── */
.sec-divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

/* ── FILTER ROW ── */
.filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.filter-btn {
  font-size: 12px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.01em;
}
.filter-btn:hover  { border-color: var(--border2); color: var(--text1); background: var(--surface2); }
.filter-btn.active { background: var(--brand); border-color: var(--brand); color: #FFFFFF; }

/* ── SEARCH ── */
.search-wrap { position: relative; margin-bottom: 12px; }
.search-input {
  width: 100%;
  font-size: 13px;
  padding: 10px 14px 10px 38px;
  border: 1px solid var(--border);
  border-radius: var(--r2);
  background: var(--surface);
  color: var(--text1);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--border2); box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--text3);
  pointer-events: none;
}
.count-label { font-size: 11px; color: var(--text3); margin-bottom: 10px; letter-spacing: 0.02em; }

/* ── PHRASE CARD ── */
.expr-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r3);
  padding: 16px 18px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  transition: border-color 0.15s;
}
.expr-card:hover { border-color: var(--border2); }
.expr-top  { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
.expr-en   { font-size: 15px; font-weight: 700; color: var(--text1); line-height: 1.4; letter-spacing: -0.2px; }
.expr-ko   { font-size: 13px; color: var(--text2); margin-bottom: 10px; line-height: 1.5; }
.expr-example {
  font-size: 12px;
  background: var(--surface2);
  border-radius: var(--r1);
  padding: 10px 12px;
  line-height: 1.7;
  border-left: 2px solid var(--border2);
}
.expr-example .ex-en { color: var(--text1); font-weight: 600; margin-bottom: 2px; }
.expr-example .ex-ko { color: var(--text3); }
.nuance-badge {
  display: inline-block;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 4px;
  background: var(--nuance-bg);
  color: var(--nuance-fg);
  margin-top: 8px;
  font-weight: 500;
}

/* ── CATEGORY BADGES ── */
.cat-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.cat-daily  { background: var(--cat-daily-bg);  color: var(--cat-daily-fg);  border: 1px solid #D8D8D8; }
.cat-biz    { background: var(--cat-biz-bg);    color: var(--cat-biz-fg); }
.cat-idiom  { background: var(--cat-idiom-bg);  color: var(--cat-idiom-fg); }
.cat-slang  { background: var(--cat-slang-bg);  color: var(--cat-slang-fg);  border: 1px solid #CBCBCB; }
.cat-filler { background: var(--cat-filler-bg); color: var(--cat-filler-fg); border: 1px solid var(--border2); }

/* ── SENTENCE CARD ── */
.sent-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r3);
  padding: 16px 18px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  transition: border-color 0.15s;
}
.sent-card:hover { border-color: var(--border2); }
.sent-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.sent-en  { font-size: 14px; font-weight: 700; color: var(--text1); line-height: 1.55; letter-spacing: -0.1px; }
.sent-ko  { font-size: 13px; color: var(--text2); line-height: 1.6; margin-top: 4px; }
.sent-note {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text3);
  margin-top: 8px;
  letter-spacing: 0.02em;
  border: 1px solid var(--border);
}
.bm-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  flex-shrink: 0;
  margin-top: -1px;
  padding: 2px 4px;
  line-height: 1;
  transition: transform 0.15s, opacity 0.15s;
  opacity: 0.5;
}
.bm-btn:hover { transform: scale(1.2); opacity: 1; }
.bm-btn.starred { opacity: 1; }

.bm-filter-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.bm-toggle {
  font-size: 11px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 0.02em;
}
.bm-toggle:hover { border-color: var(--border2); color: var(--text1); }
.bm-toggle.on    { background: var(--brand); border-color: var(--brand); color: #FFFFFF; }

/* ── QUIZ ── */
.quiz-wrap { max-width: 540px; margin: 0 auto; }

.quiz-progress-bar {
  height: 3px;
  background: var(--surface3);
  border-radius: 2px;
  margin-bottom: 20px;
  overflow: hidden;
}
.quiz-fill {
  height: 100%;
  background: var(--brand);
  border-radius: 2px;
  transition: width 0.4s ease;
}
.quiz-meta {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.quiz-type-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text2);
  margin-bottom: 14px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border: 1px solid var(--border);
}
.quiz-prompt {
  font-size: 17px;
  font-weight: 700;
  color: var(--text1);
  line-height: 1.55;
  margin-bottom: 10px;
  letter-spacing: -0.2px;
}
.quiz-blank {
  color: var(--text1);
  background: var(--surface3);
  padding: 1px 6px;
  border-radius: 3px;
  border-bottom: 2px solid var(--brand);
}
.quiz-hint {
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 18px;
  padding-left: 1px;
}
.quiz-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.opt-btn {
  font-size: 14px;
  padding: 13px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--r2);
  background: var(--surface);
  color: var(--text1);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  font-weight: 500;
  line-height: 1.4;
}
.opt-btn:hover:not(:disabled) {
  border-color: var(--brand);
  background: var(--surface2);
}
.opt-btn.correct {
  border-color: var(--brand);
  background: var(--correct-bg);
  color: var(--correct-fg);
  font-weight: 600;
}
.opt-btn.wrong {
  border-color: var(--border);
  background: var(--wrong-bg);
  color: var(--wrong-fg);
  text-decoration: line-through;
}
.opt-btn:disabled { cursor: default; }

.quiz-feedback {
  border-radius: var(--r2);
  padding: 13px 16px;
  margin-bottom: 14px;
  font-size: 13px;
  line-height: 1.65;
  display: none;
  border: 1px solid var(--border);
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct-fb { background: var(--brand); color: #FFFFFF; border-color: var(--brand); }
.quiz-feedback.wrong-fb   { background: var(--surface2); color: var(--text2); }
.feedback-result { font-weight: 700; font-size: 14px; margin-bottom: 4px; }

.next-btn {
  width: 100%;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 14px;
  border: none;
  border-radius: var(--r2);
  background: var(--brand);
  color: #FFFFFF;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.next-btn:hover  { background: var(--brand-hover); }
.next-btn:active { transform: scale(0.99); }

.quiz-start { text-align: center; padding: 40px 20px; }
.quiz-start-icon  { font-size: 44px; margin-bottom: 16px; }
.quiz-start-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 10px; }
.quiz-start-desc  { font-size: 14px; color: var(--text2); margin-bottom: 28px; line-height: 1.65; }
.best-badge {
  display: inline-block;
  font-size: 12px;
  color: var(--text3);
  border: 1px solid var(--border);
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 22px;
}
.start-btn {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 14px 44px;
  border: none;
  border-radius: var(--r2);
  background: var(--brand);
  color: #FFFFFF;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.start-btn:hover  { background: var(--brand-hover); }
.start-btn:active { transform: scale(0.98); }

.quiz-result { text-align: center; padding: 40px 20px; }
.result-score {
  font-size: 72px;
  font-weight: 800;
  color: var(--text1);
  letter-spacing: -3px;
  line-height: 1;
  margin: 12px 0 4px;
}
.result-total { font-size: 13px; color: var(--text3); margin-bottom: 16px; letter-spacing: 0.05em; }
.result-grade { font-size: 18px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.3px; }
.result-desc  { font-size: 14px; color: var(--text2); line-height: 1.65; margin-bottom: 6px; }
.best-score   { font-size: 12px; color: var(--text3); margin-bottom: 28px; }
.replay-btn {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 13px 40px;
  border: none;
  border-radius: var(--r2);
  background: var(--brand);
  color: #FFFFFF;
  cursor: pointer;
  transition: background 0.15s;
}
.replay-btn:hover { background: var(--brand-hover); }

/* ── BOOKMARKS EMPTY STATE ── */
.bm-empty {
  text-align: center;
  padding: 50px 20px;
  color: var(--text3);
}
.bm-empty-icon  { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
.bm-empty-title { font-size: 15px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
.bm-empty-desc  { font-size: 13px; line-height: 1.6; }

/* ── BOOKMARK SECTION TABS ── */
.bm-sec-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.bm-sec-tab {
  font-size: 12px; font-weight: 600; padding: 6px 16px;
  border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text3);
  cursor: pointer; transition: all 0.15s;
}
.bm-sec-tab:hover  { color: var(--text1); border-color: var(--border2); }
.bm-sec-tab.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── SECTION HEADER ── */
.sec-header { margin-bottom: 18px; }
.sec-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--text1);
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.sec-desc { font-size: 13px; color: var(--text3); line-height: 1.5; }

/* ── BOTTOM NAV (mobile only, hidden on desktop) ── */
.bottom-nav { display: none; }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  /* Hide top nav, show bottom tab bar */
  .nav { display: none; }
  .content {
    padding: 16px 14px calc(68px + env(safe-area-inset-bottom));
    /* no offset needed — header is sticky, nav is hidden */
  }

  /* Bottom tab bar */
  .bottom-nav {
    display: flex;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #FFFFFF;
    border-top: 1px solid var(--border);
    z-index: 200;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .bn-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 8px 0 10px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .bn-btn.active { color: var(--brand); }
  .bn-icon { font-size: 20px; line-height: 1; }

  /* Filter rows: horizontal scroll, no wrap */
  .filter-row {
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
    margin-bottom: 10px;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; }

  /* bm-filter-row: stack vertically on mobile */
  .bm-filter-row { flex-direction: column; align-items: stretch; gap: 6px; }
  .bm-filter-row .filter-row { flex: none; }

const CAT_LABEL = {
  daily:'일상 회화', biz:'비즈니스', idiom:'숙어', slang:'슬랭', filler:'필러 표현',
  greeting:'인사', smalltalk:'일상 대화', work:'직장/비즈니스',
  travel:'여행', feelings:'감정', apology:'사과/부탁', phone:'전화/문자'
};

function catBadgeClass(cat) {
  return { daily:'cat-daily', biz:'cat-biz', idiom:'cat-idiom', slang:'cat-slang', filler:'cat-filler' }[cat] || '';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

const SECS = ['home','phrases','sentences','quiz','bookmarks'];
let currentSec = 'home';
let shuffledPhrases   = [];
let shuffledSentences = [];

function showSection(id) {
  SECS.forEach(s => {
    document.getElementById('sec-'+s).classList.toggle('active', s===id);
  });
  document.querySelectorAll('.nav-btn, .bn-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sec===id);
  });
  currentSec = id;
  if (id==='home') {
    renderHome();
  }
  if (id==='phrases') {
    shuffledPhrases = shuffle(DATA.phrases);   // 진입할 때마다 순서 랜덤
    renderPhrases();
  }
  if (id==='sentences') {
    shuffledSentences = shuffle(DATA.sentences); // 진입할 때마다 순서 랜덤
    renderSentences();
  }
  if (id==='quiz') {
    // 진행 중이든 아니든 항상 시작 화면으로 리셋
    quizState.phase = 'idle';
    renderQuizStart();
  }
  if (id==='bookmarks') {
    renderBookmarks();
  }
}

let currentPhraseCat = 'all';

function setPhraseFilter(cat) {
  currentPhraseCat = cat;
  document.querySelectorAll('#phrase-filters .filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat===cat);
  });
  renderPhrases();
}

function togglePhraseBookmark(id) {
  if (phraseBm.has(id)) phraseBm.delete(id); else phraseBm.add(id);
  savePhraseBm();
  renderPhrases();
}

function renderPhrases() {
  const query = (document.getElementById('phrase-search')?.value || '').toLowerCase().trim();
  const src   = shuffledPhrases.length ? shuffledPhrases : DATA.phrases;
  let items   = currentPhraseCat==='all' ? src : src.filter(p=>p.cat===currentPhraseCat);
  if (query) {
    items = items.filter(p => p.en.toLowerCase().includes(query) || p.ko.includes(query));
  }
  document.getElementById('phrase-count').textContent = `총 ${items.length}개 표현`;
  document.getElementById('phrase-list').innerHTML = items.map(p => {
    const badgeCls = catBadgeClass(p.cat);
    const isBm = phraseBm.has(p.id);
    return `
      <div class="expr-card">
        <div class="expr-top">
          <div class="expr-en">${esc(p.en)}</div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            <span class="cat-badge ${badgeCls}">${CAT_LABEL[p.cat]||p.cat}</span>
            <button class="bm-btn${isBm?' starred':''}" onclick="togglePhraseBookmark(${p.id})" title="즐겨찾기">${isBm?'★':'☆'}</button>
          </div>
        </div>
        <div class="expr-ko">${esc(p.ko)}</div>
        <div class="expr-example">
          <div class="ex-en">${esc(p.ex_en)}</div>
          <div class="ex-ko">${esc(p.ex_ko)}</div>
        </div>
        ${p.nuance ? `<div class="nuance-badge">${esc(p.nuance)}</div>` : ''}
      </div>`;
  }).join('') || '<div style="text-align:center;padding:30px;color:var(--text3)">검색 결과가 없어요</div>';
}

function toggleBmFilter() {
  bmFilterOn = !bmFilterOn;
  document.getElementById('bm-toggle').classList.toggle('on', bmFilterOn);
  renderSentences();
}

function toggleBookmark(id) {
  if (bookmarks.has(id)) bookmarks.delete(id); else bookmarks.add(id);
  saveBm();
  renderSentences();
}

function renderSentences() {
  const src  = shuffledSentences.length ? shuffledSentences : DATA.sentences;
  let items  = currentSentCat==='all' ? src : src.filter(s=>s.cat===currentSentCat);
  if (bmFilterOn) items = items.filter(s=>bookmarks.has(s.id));
  document.getElementById('sent-count').textContent = `총 ${items.length}개 예문${bmFilterOn?' (즐겨찾기)':''}`;
  document.getElementById('sent-list').innerHTML = items.map(s => {
    const isBm = bookmarks.has(s.id);
    return `
      <div class="sent-card">
        <div class="sent-top">
          <div>
            <div class="sent-en">${esc(s.en)}</div>
            <div class="sent-ko">${esc(s.ko)}</div>
            ${s.note ? `<span class="sent-note">${esc(s.note)}</span>` : ''}
          </div>
          <button class="bm-btn${isBm?' starred':''}" onclick="toggleBookmark(${s.id})" title="즐겨찾기">${isBm?'★':'☆'}</button>
        </div>
      </div>`;
  }).join('') || '<div style="text-align:center;padding:30px;color:var(--text3)">' + (bmFilterOn ? '즐겨찾기한 예문이 없어요 ☆' : '표시할 예문이 없어요') + '</div>';
}

/* ═══════════════════════════════════════════════
   BOOKMARKS
═══════════════════════════════════════════════ */
let currentBmTab = 'all';

function setBmTab(tab) {
  currentBmTab = tab;
  document.querySelectorAll('.bm-sec-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab===tab);
  });
  renderBookmarks();
}

function renderBookmarks() {
  const bmPhrases   = DATA.phrases.filter(p => phraseBm.has(p.id));
  const bmSentences = DATA.sentences.filter(s => bookmarks.has(s.id));

  let totalCount = 0;
  let html = '';

  if (currentBmTab !== 'sentences' && bmPhrases.length > 0) {
    totalCount += bmPhrases.length;
    if (currentBmTab === 'all') html += `<div class="count-label" style="margin-bottom:6px;font-weight:600;color:var(--text2)">표현/숙어 ${bmPhrases.length}개</div>`;
    html += bmPhrases.map(p => {
      const badgeCls = catBadgeClass(p.cat);
      return `
        <div class="expr-card">
          <div class="expr-top">
            <div class="expr-en">${esc(p.en)}</div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
              <span class="cat-badge ${badgeCls}">${CAT_LABEL[p.cat]||p.cat}</span>
              <button class="bm-btn starred" onclick="removePhraseFromBm(${p.id})" title="저장 해제">★</button>
            </div>
          </div>
          <div class="expr-ko">${esc(p.ko)}</div>
          <div class="expr-example">
            <div class="ex-en">${esc(p.ex_en)}</div>
            <div class="ex-ko">${esc(p.ex_ko)}</div>
          </div>
          ${p.nuance ? `<div class="nuance-badge">${esc(p.nuance)}</div>` : ''}
        </div>`;
    }).join('');
  }

  if (currentBmTab !== 'phrases' && bmSentences.length > 0) {
    totalCount += bmSentences.length;
    if (currentBmTab === 'all' && bmPhrases.length > 0) html += `<div class="count-label" style="margin:14px 0 6px;font-weight:600;color:var(--text2)">예문 ${bmSentences.length}개</div>`;
    else if (currentBmTab === 'all') html += `<div class="count-label" style="margin-bottom:6px;font-weight:600;color:var(--text2)">예문 ${bmSentences.length}개</div>`;
    html += bmSentences.map(s => {
      return `
        <div class="sent-card">
          <div class="sent-top">
            <div>
              <div class="sent-en">${esc(s.en)}</div>
              <div class="sent-ko">${esc(s.ko)}</div>
              ${s.note ? `<span class="sent-note">${esc(s.note)}</span>` : ''}
            </div>
            <button class="bm-btn starred" onclick="removeSentFromBm(${s.id})" title="저장 해제">★</button>
          </div>
        </div>`;
    }).join('');
  }

  if (currentBmTab !== 'sentences') totalCount += (currentBmTab==='all' ? 0 : bmPhrases.length); // already counted
  const total = currentBmTab==='all' ? bmPhrases.length + bmSentences.length
              : currentBmTab==='phrases' ? bmPhrases.length : bmSentences.length;

  document.getElementById('bm-count').textContent = `총 ${total}개 저장됨`;

  if (total === 0) {
    html = `
      <div class="bm-empty">
        <div class="bm-empty-icon">☆</div>
        <div class="bm-empty-title">저장된 항목이 없어요</div>
        <div class="bm-empty-desc">표현이나 예문 카드의 ☆ 버튼을 눌러<br>즐겨찾기에 저장해 보세요.</div>
      </div>`;
  }
  document.getElementById('bm-list').innerHTML = html;
}

function removePhraseFromBm(id) {
  phraseBm.delete(id);
  savePhraseBm();
  renderBookmarks();
}

function removeSentFromBm(id) {
  bookmarks.delete(id);
  saveBm();
  renderBookmarks();
}

/* ═══════════════════════════════════════════════
   QUIZ
═══════════════════════════════════════════════ */
const quizState = {
  phase: 'idle',  // idle | playing | feedback | result
  pool:  [],
  index: 0,
  score: 0,
  total: 10
};

function renderQuizStart() {
  document.getElementById('quiz-content').innerHTML = `
    <div class="quiz-start card">
      <div class="quiz-start-icon">🎯</div>
      <div class="quiz-start-title">영어 퀴즈</div>
      <div class="quiz-start-desc">
        지금까지 배운 표현들을 테스트해 보세요!<br>
        매번 랜덤으로 10문제가 출제됩니다.
      </div>
      ${getBestScore()>0 ? `<div class="best-badge">최고 점수 ${getBestScore()} / 10</div>`:''}
      <button class="start-btn" onclick="startQuiz()">시작하기</button>
    </div>`;
}

function startQuiz() {
  quizState.pool  = shuffle(DATA.quiz).slice(0, quizState.total);
  quizState.index = 0;
  quizState.score = 0;
  quizState.phase = 'playing';
  renderQuestion();
}

function renderQuestion() {
  const item    = quizState.pool[quizState.index];
  const pct     = Math.round((quizState.index / quizState.total) * 100);
  const typeLabel = item.type==='fill' ? '빈칸 채우기' : '선택형';

  // Highlight blank in fill questions
  let promptHtml = esc(item.prompt);
  if (item.type==='fill') {
    promptHtml = promptHtml.replace(/___+/, '<span class="quiz-blank">_____</span>');
  }

  const optionsHtml = item.options.map(o => `
    <button class="opt-btn" onclick="checkAnswer(this)">${esc(o)}</button>
  `).join('');

  document.getElementById('quiz-content').innerHTML = `
    <div class="quiz-progress-bar"><div class="quiz-fill" style="width:${pct}%"></div></div>
    <div class="quiz-meta">${quizState.index+1} / ${quizState.total} · 현재 점수: ${quizState.score}</div>
    <div class="quiz-type-badge">${typeLabel}</div>
    <div class="quiz-prompt">${promptHtml}</div>
    ${item.hint ? `<div class="quiz-hint">힌트: ${esc(item.hint)}</div>` : ''}
    <div class="quiz-options">${optionsHtml}</div>
    <div class="quiz-feedback" id="quiz-fb"></div>
    <div id="quiz-next-wrap"></div>`;
}

function checkAnswer(btn) {
  const item = quizState.pool[quizState.index];
  const selected = btn.textContent.trim();
  const correct  = selected.toLowerCase() === item.answer.trim().toLowerCase();
  if (correct) quizState.score++;

  // Disable all buttons and mark correct/wrong
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    // Compare text content to answer
    const bText = b.textContent.trim().toLowerCase();
    if (bText === item.answer.trim().toLowerCase()) b.classList.add('correct');
    else if (b === btn && !correct) b.classList.add('wrong');
  });

  // Feedback
  const fb = document.getElementById('quiz-fb');
  fb.className = 'quiz-feedback show ' + (correct ? 'correct-fb' : 'wrong-fb');
  fb.innerHTML = correct
    ? `<div class="feedback-result">✅ 정답이에요!</div>정답: <strong>${esc(item.answer)}</strong>`
    : `<div class="feedback-result">❌ 틀렸어요</div>정답: <strong>${esc(item.answer)}</strong>`;

  // Next button
  const isLast = quizState.index+1 >= quizState.total;
  document.getElementById('quiz-next-wrap').innerHTML = `
    <button class="next-btn" onclick="${isLast?'showResult()':'nextQuestion()'}">${isLast?'결과 보기':'다음 문제 →'}</button>`;

  quizState.phase = 'feedback';
}

function nextQuestion() {
  quizState.index++;
  quizState.phase = 'playing';
  renderQuestion();
}

function showResult() {
  const s = quizState.score;
  const t = quizState.total;
  const best = Math.max(s, getBestScore());
  setBestScore(best);

  let grade, desc;
  if (s >= 9)       { grade = '🏆 원어민급!';    desc = '완벽해요! 정말 대단해요.'; }
  else if (s >= 7)  { grade = '🌟 훌륭해요!';    desc = '원어민 표현을 잘 익히고 있어요!'; }
  else if (s >= 5)  { grade = '👍 잘 하고 있어요!'; desc = '조금만 더 연습하면 완벽해질 거예요.'; }
  else if (s >= 3)  { grade = '📚 더 연습해요';  desc = '표현들을 다시 한 번 복습해 보세요.'; }
  else              { grade = '🌱 시작이 반!';   desc = '처음부터 차근차근 해봐요. 할 수 있어요!'; }

  document.getElementById('quiz-content').innerHTML = `
    <div class="quiz-result card">
      <div style="font-size:13px;color:var(--text3);margin-bottom:4px">최종 결과</div>
      <div class="result-score">${s}</div>
      <div class="result-total">/ ${t} 문제</div>
      <div class="result-grade">${grade}</div>
      <div class="result-desc">${desc}</div>
      <div class="best-score">최고 점수: ${best} / ${t}</div>
      <button class="replay-btn" onclick="startQuiz()">다시 풀기</button>
    </div>`;
  quizState.phase = 'result';
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
renderHome();
renderPhrases();
renderSentences();
</script>
